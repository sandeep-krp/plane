name: Build images

# Builds all six production images under one release tag, so every component
# can be deployed from the same version string:
#   - web, admin, space: built from source (unchanged upstream Dockerfiles;
#     these are prebuilt static/server bundles, so there's no overlay shortcut).
#   - api: a thin overlay on top of upstream's published makeplane/plane-backend
#     image (see docker/api-overlay.Dockerfile).
#   - live, proxy: built from source too. This fork doesn't change either of
#     them, but building them from this repo's own tree (rather than pointing
#     at upstream's images under a different tag) keeps all six images on one
#     consistent tag.
#
# Images are pushed to GitHub Container Registry under this repo's own account
# (ghcr.io/<owner>/plane-<service>), authenticated with the workflow's own
# built-in GITHUB_TOKEN — no external registry secrets needed.

on:
  push:
    tags:
      - "v*-oidc.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v1.3.1-oidc.1)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  resolve-tag:
    name: Resolve tags
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      upstream_tag: ${{ steps.resolve.outputs.upstream_tag }}
      image_owner: ${{ steps.resolve.outputs.image_owner }}
    steps:
      - id: resolve
        run: |
          RELEASE_TAG="${{ inputs.tag || github.ref_name }}"
          # Our tags look like <upstream-tag>-oidc.<n>, e.g. v1.3.1-oidc.1
          UPSTREAM_TAG="${RELEASE_TAG%%-oidc*}"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=${UPSTREAM_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

  build-web:
    name: Build frontend
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.resolve-tag.outputs.image_owner }}/plane-frontend:${{ needs.resolve-tag.outputs.release_tag }}"
          docker build -f apps/web/Dockerfile.web -t "$IMAGE" .
          docker push "$IMAGE"

  build-admin:
    name: Build admin
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.resolve-tag.outputs.image_owner }}/plane-admin:${{ needs.resolve-tag.outputs.release_tag }}"
          docker build -f apps/admin/Dockerfile.admin -t "$IMAGE" .
          docker push "$IMAGE"

  build-space:
    name: Build space
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.resolve-tag.outputs.image_owner }}/plane-space:${{ needs.resolve-tag.outputs.release_tag }}"
          docker build -f apps/space/Dockerfile.space -t "$IMAGE" .
          docker push "$IMAGE"

  build-api:
    name: Build backend (overlay)
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.resolve-tag.outputs.image_owner }}/plane-backend:${{ needs.resolve-tag.outputs.release_tag }}"
          docker build -f docker/api-overlay.Dockerfile \
            --build-arg PLANE_BACKEND_TAG="${{ needs.resolve-tag.outputs.upstream_tag }}" \
            -t "$IMAGE" \
            apps/api
          docker push "$IMAGE"

  build-live:
    name: Build live
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.resolve-tag.outputs.image_owner }}/plane-live:${{ needs.resolve-tag.outputs.release_tag }}"
          docker build -f apps/live/Dockerfile.live -t "$IMAGE" .
          docker push "$IMAGE"

  build-proxy:
    name: Build proxy
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.resolve-tag.outputs.image_owner }}/plane-proxy:${{ needs.resolve-tag.outputs.release_tag }}"
          docker build -f apps/proxy/Dockerfile.ce -t "$IMAGE" apps/proxy
          docker push "$IMAGE"
